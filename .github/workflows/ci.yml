name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          # runner has no ~/.claude/.env; lib/config.ts fail-closes without a vault
          VAULT_ROOT: ${{ github.workspace }}/demo-vault
          HUD_TZ: America/New_York
      - run: npx tsc --noEmit
      # Catches build-breaking changes here instead of at `fly deploy`.
      - run: npx next build
        env:
          VAULT_ROOT: ${{ github.workspace }}/demo-vault
          HUD_TZ: America/New_York
