name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          VAULT_ROOT: ${{ github.workspace }}/demo-vault
          HUD_TZ: America/New_York
      - run: npx tsc --noEmit
